services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/backend
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

  queue:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    command: php artisan queue:work --tries=3
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - redis
      - postgres

  reverb:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    command: php artisan reverb:start --debug
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - redis

  postgres:
    image: postgres:18-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: restall_db
      POSTGRES_USER: restall_user
      POSTGRES_PASSWORD: secretpassword
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  vue:
    image: node:24-alpine
    working_dir: /app
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app

volumes:
  pgdata:
  redisdata: